#XPL_PATCH this is to be ran as a hook before configuring portage
before_configure_portage(){
    local makeconf="/etc/portage/make.conf"

    # Make sure the file exists
    if [[ ! -e "$makeconf" ]]; then
        echo "Creating $makeconf"
        touch "$makeconf" || { echo "Cannot create $makeconf"; return 1; }
    fi

    # Backup
    cp -a "$makeconf" "${makeconf}.bak-$(date +%Y%m%d%H%M%S)" || {
        echo "Failed to back up $makeconf"
        return 1
    }

    # COMMON_FLAGS
    if grep -qE '^COMMON_FLAGS=' "$makeconf"; then
        sed -i 's/^COMMON_FLAGS=.*/COMMON_FLAGS="-march=native -O2 -pipe"/' "$makeconf"
    else
        echo 'COMMON_FLAGS="-march=native -O2 -pipe"' >>"$makeconf"
    fi

    # MAKEOPTS
    if grep -qE '^MAKEOPTS=' "$makeconf"; then
        sed -i 's/^MAKEOPTS=.*/MAKEOPTS="-j8 -l9"/' "$makeconf"
    else
        echo 'MAKEOPTS="-j8 -l9"' >>"$makeconf"
    fi

    # ACCEPT_LICENSE
    if grep -qE '^ACCEPT_LICENSE=' "$makeconf"; then
        sed -i 's/^ACCEPT_LICENSE=.*/ACCEPT_LICENSE="*"/' "$makeconf"
    else
        echo 'ACCEPT_LICENSE="*"' >>"$makeconf"
    fi


    #Make sure we have the package config use folder for portage
    mkdir -p /etc/portage/package.use

    #LSYNCD (select which LUA to use)
    echo "app-admin/lsyncd LUA_SINGLE_TARGET: lua5-4" > /etc/portage/package.use/lsyncd

    #Postfix (sasl, ssl, tls)
    echo "mail-mta/postfix sasl ssl tls lmdb" >  /etc/portage/package.use/postfix
}

#XPL_PATCH recreate the gentoo repos dir before the emerge git sync
after_download_stage3() {
    mkdir -p /var/db/repos/gentoo
}

#XPL_PATCH enable the GURU overlay.
# This runs after the installer has configured portage and synced the main
# ::gentoo tree (and after dev-vcs/git is installed), but before
# ADDITIONAL_PACKAGES are emerged. GURU provides some of those packages
# (multitail, crudini, nmon, App-perlbrew), so it must be active by now.
after_configure_portage() {
    einfo 'after configure portage: enabling GURU overlay'

    # eselect-repository manages /etc/portage/repos.conf entries and ships
    # the official repository list (which includes guru). git is already
    # present, which guru needs for its git-based sync.
    try emerge --verbose --noreplace app-eselect/eselect-repository

    try eselect repository enable guru
    try emaint sync -r guru
}

#XPL_PATCH save the cpu flags
after_install() {
   einfo 'after install'
   echo "*/* $(cpuid2cpuflags)" > /etc/portage/package.use/00cpu-flags
}

